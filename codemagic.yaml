workflows:
  ios-dylib-build:
    name: Build iOS Dylib (TurathGate)
    max_build_duration: 10
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Build Dynamic Library (dylib)
        script: |
          echo "جاري بدء عملية بناء ملف dylib..."
          
          # تحديد مسار الـ SDK الخاص بالآيفون (iPhoneOS)
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # أمر الـ Compilation لبناء الـ dylib يدعم معمارية arm64 للآيفون
          clang -dynamiclib -isysroot "$SDK_PATH" \
                -arch arm64 \
                -framework Foundation \
                -framework UIKit \
                -install_name @executable_path/TurathGate.dylib \
                TurathGate.m \
                -o TurathGate.dylib
          
          echo "تم بناء الملف بنجاح!"
          ls -la TurathGate.dylib
    artifacts:
      - "*.dylib"
